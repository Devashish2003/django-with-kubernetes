version: "3.9"
services:
  k8s:
    depends_on:
      - postgres_db
    build:
      context: ./Django_K8s
      dockerfile: Dockerfile
    image: kub_dj
    environment:
      - PORT=8020
    env_file:
      - Django_K8s/.env
    ports:
      - "8001:8020"
    command: sh -c "chmod +x /app/migrate.sh && /app/migrate.sh && /app/entrypoint.sh"
  postgres_db:
    image: postgres
    restart: always
    command: -p 5433
    env_file:
      - Django_K8s/.env
    expose:
      - 5433
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

#can add multiple database, static files, external static files and apps here
volumes:
  postgres_data: