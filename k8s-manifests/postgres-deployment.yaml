apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: django-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
        - name: postgres
          image: postgres
          args: ["-p", "5433"]
          envFrom:
            - configMapRef:
                name: django-config
            - secretRef:
                name: django-secrets
          ports:
            - containerPort: 5433
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc